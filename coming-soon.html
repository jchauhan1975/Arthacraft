<!DOCTYPE html>

<title>Coming Soon — ARTHA Craft</title>
<link rel="stylesheet" href="assets/style.css">
<style>
.cs{min-height:100vh;display:flex;align-items:center;justify-content:center;text-align:center;padding:40px 24px;position:relative;}
.cs::before{content:"";position:absolute;inset:0;background:radial-gradient(ellipse at 50% 40%,rgba(139,26,26,0.06) 0%,transparent 60%);pointer-events:none;}
.cs-inner{max-width:560px;position:relative;z-index:1;}
.cs-brand{font-family:var(--mono);font-size:10px;letter-spacing:4px;text-transform:uppercase;color:var(--red-light);margin-bottom:40px;display:flex;align-items:center;justify-content:center;gap:12px;}
.cs-brand::before,.cs-brand::after{content:"";width:20px;height:1px;background:var(--red-light);}
.cs-title{font-family:var(--display);font-size:52px;font-weight:600;color:var(--white);line-height:1.08;margin-bottom:20px;letter-spacing:-1px;}
.cs-title em{color:var(--red-light);font-style:italic;font-weight:400;}
.cs-body{font-size:17px;line-height:1.8;color:var(--mist);font-weight:300;margin-bottom:36px;}
.cs-btns{display:flex;gap:14px;justify-content:center;flex-wrap:wrap;}
.btn{font-family:var(--mono);font-size:10px;letter-spacing:2px;text-transform:uppercase;padding:14px 28px;border-radius:3px;transition:all 0.25s;display:inline-flex;align-items:center;gap:8px;}
.btn-red{background:var(--red);color:var(--white);box-shadow:0 4px 24px rgba(139,26,26,0.3);}
.btn-red:hover{background:var(--red-warm);transform:translateY(-1px);box-shadow:0 8px 32px rgba(139,26,26,0.4);}
.btn-ghost{border:1px solid rgba(255,255,255,0.12);color:rgba(245,240,232,0.5);}
.btn-ghost:hover{border-color:rgba(255,255,255,0.3);color:var(--paper);background:rgba(255,255,255,0.03);}
.cs-sub{font-family:var(--mono);font-size:10px;letter-spacing:1px;color:var(--ash);margin-top:48px;}
.cs-sub a{color:var(--red-light);border-bottom:1px dotted rgba(212,71,44,0.4);transition:border-color 0.2s;}
.cs-sub a:hover{border-color:var(--red-light);}
</style>
</head>
<body>
<nav class="nav" id="nav">
  <a href="index.html" class="nav-logo"><em>ARTHA</em> Craft</a>
  <div class="nav-links">
    <a href="index.html">Home</a>
    <a href="articles.html">Series</a>
    <a href="about.html">About</a>
    <a href="https://substack.com/@jitanderchauhan" target="_blank" class="nav-follow">Subscribe</a>
  </div>
</nav>
<section class="cs">
  <div class="cs-inner">
    <p class="cs-brand">ARTHA Craft</p>
    <h1 class="cs-title">This article is<br><em>coming soon.</em></h1>
    <p class="cs-body">The 12-part series is publishing one article at a time. Subscribe on Substack to get notified when this article goes live.</p>
    <div class="cs-btns">
      <a href="https://substack.com/@jitanderchauhan" target="_blank" class="btn btn-red">Subscribe on Substack &rarr;</a>
      <a href="index.html" class="btn btn-ghost">Back to home</a>
    </div>
    <p class="cs-sub">Or read what's already live: <a href="articles/article-1.html">Article 1</a></p>
  </div>
</section>
<script>
  var n=document.getElementById('nav');
  window.addEventListener('scroll',function(){n.classList.toggle('scrolled',window.scrollY>40);});
</script>
</body>
</html>
